<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="cardBg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff8"/>
      <stop offset="100%" stop-color="#faf8f0"/>
    </linearGradient>
    <linearGradient id="gloss5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Professional club pip -->
    <g id="club5">
      <circle cx="0" cy="-8" r="10.5"/>
      <circle cx="-9.5" cy="3" r="10.5"/>
      <circle cx="9.5" cy="3" r="10.5"/>
      <rect x="-3.5" y="2" width="7" height="16" rx="1"/>
      <path d="M-7,17 Q0,20 7,17 L5,14 Q0,16 -5,14Z"/>
    </g>
    <!-- Small club for index -->
    <g id="clubSmall">
      <circle cx="0" cy="-4" r="5"/>
      <circle cx="-4.5" cy="1.5" r="5"/>
      <circle cx="4.5" cy="1.5" r="5"/>
      <rect x="-1.8" y="1" width="3.6" height="8" rx="0.5"/>
      <path d="M-3.5,8.5 Q0,10 3.5,8.5 L2.5,7 Q0,8 -2.5,7Z"/>
    </g>
  </defs>

  <!-- Card body -->
  <rect width="250" height="350" rx="14" fill="url(#cardBg5)" stroke="#c0c0c0" stroke-width="0.8"/>
  <!-- Inner border -->
  <rect x="5" y="5" width="240" height="340" rx="10" fill="none" stroke="#e8e4dc" stroke-width="0.4"/>

  <!-- Top-left index — JUMBO -->
  <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#111" letter-spacing="-1">5</text>
  <use href="#clubSmall" x="26" y="68" fill="#111"/>

  <!-- Bottom-right index (rotated) -->
  <g transform="rotate(180, 125, 175)">
    <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#111" letter-spacing="-1">5</text>
    <use href="#clubSmall" x="26" y="68" fill="#111"/>
  </g>

  <!-- 5-pip standard layout: 2 top, 1 center, 2 bottom -->
  <!-- Top row -->
  <use href="#club5" x="88"  y="88"  fill="#111"/>
  <use href="#club5" x="162" y="88"  fill="#111"/>

  <!-- Center -->
  <use href="#club5" x="125" y="175" fill="#111"/>

  <!-- Bottom row -->
  <use href="#club5" x="88"  y="262" fill="#111"/>
  <use href="#club5" x="162" y="262" fill="#111"/>

  <!-- Gloss overlay -->
  <rect width="250" height="350" rx="14" fill="url(#gloss5)" opacity="0.3"/>
</svg>
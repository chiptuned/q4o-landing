<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <!-- Card base with subtle texture -->
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff8"/>
      <stop offset="100%" stop-color="#faf8f0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3357"/>
      <stop offset="100%" stop-color="#0f1f3a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c840"/>
      <stop offset="50%" stop-color="#c8a020"/>
      <stop offset="100%" stop-color="#e8c840"/>
    </linearGradient>
    <clipPath id="frameClip">
      <rect x="52" y="58" width="146" height="234" rx="3"/>
    </clipPath>
  </defs>

  <!-- Card body -->
  <rect width="250" height="350" rx="14" fill="url(#cardBg)" stroke="#c0c0c0" stroke-width="0.8"/>
  <!-- Inner border -->
  <rect x="5" y="5" width="240" height="340" rx="10" fill="none" stroke="#e8e4dc" stroke-width="0.4"/>

  <!-- Top-left index — JUMBO style -->
  <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#111" letter-spacing="-1">Q</text>
  <text x="21" y="78" font-family="Georgia, serif" font-size="30" fill="#111">♠</text>

  <!-- Bottom-right index (rotated) -->
  <g transform="rotate(180, 125, 175)">
    <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#111" letter-spacing="-1">Q</text>
    <text x="21" y="78" font-family="Georgia, serif" font-size="30" fill="#111">♠</text>
  </g>

  <!-- Court card frame -->
  <rect x="52" y="58" width="146" height="234" rx="3" fill="#fdfcf5" stroke="#b8a880" stroke-width="0.6"/>
  <!-- Inner decorative border -->
  <rect x="56" y="62" width="138" height="226" rx="2" fill="none" stroke="#d4c8a0" stroke-width="0.3"/>

  <!-- Queen illustration (clipped to frame) -->
  <g clip-path="url(#frameClip)">
    <!-- Background pattern -->
    <rect x="52" y="58" width="146" height="234" fill="#fdfcf5"/>

    <!-- Decorative corner flourishes -->
    <path d="M60,66 Q70,66 70,76" fill="none" stroke="#c8a92e" stroke-width="0.5" opacity="0.4"/>
    <path d="M190,66 Q180,66 180,76" fill="none" stroke="#c8a92e" stroke-width="0.5" opacity="0.4"/>
    <path d="M60,284 Q70,284 70,274" fill="none" stroke="#c8a92e" stroke-width="0.5" opacity="0.4"/>
    <path d="M190,284 Q180,284 180,274" fill="none" stroke="#c8a92e" stroke-width="0.5" opacity="0.4"/>

    <!-- === QUEEN FIGURE === -->
    <!-- Hair (background layer) -->
    <path d="M100,100 Q95,80 108,72 Q120,65 125,68 Q130,65 142,72 Q155,80 150,100"
          fill="#1a0f08" stroke="none"/>
    <path d="M100,100 Q98,130 100,155" fill="none" stroke="#1a0f08" stroke-width="10" stroke-linecap="round"/>
    <path d="M150,100 Q152,130 150,155" fill="none" stroke="#1a0f08" stroke-width="10" stroke-linecap="round"/>

    <!-- Crown -->
    <g fill="url(#goldGrad)" stroke="#8b7120" stroke-width="0.6">
      <polygon points="125,62 105,82 111,72 117,82 125,66 133,82 139,72 145,82"/>
      <!-- Crown band -->
      <rect x="107" y="78" width="36" height="6" rx="1"/>
      <!-- Jewels -->
      <circle cx="113" cy="70" r="2.5" fill="#c0392b" stroke="#8b1a1a" stroke-width="0.4"/>
      <circle cx="125" cy="62" r="3" fill="#1a5276" stroke="#0e3352" stroke-width="0.4"/>
      <circle cx="137" cy="70" r="2.5" fill="#c0392b" stroke="#8b1a1a" stroke-width="0.4"/>
    </g>

    <!-- Face/head -->
    <ellipse cx="125" cy="108" rx="24" ry="28" fill="#f5deb3" stroke="#c8a882" stroke-width="0.6"/>

    <!-- Eyebrows -->
    <path d="M112,98 Q116,95 120,97" fill="none" stroke="#3d2b1f" stroke-width="0.8"/>
    <path d="M130,97 Q134,95 138,98" fill="none" stroke="#3d2b1f" stroke-width="0.8"/>

    <!-- Eyes -->
    <ellipse cx="116" cy="103" rx="4" ry="3" fill="white" stroke="#3d2b1f" stroke-width="0.5"/>
    <ellipse cx="134" cy="103" rx="4" ry="3" fill="white" stroke="#3d2b1f" stroke-width="0.5"/>
    <circle cx="116" cy="103" r="2" fill="#2c1810"/>
    <circle cx="134" cy="103" r="2" fill="#2c1810"/>
    <circle cx="116.5" cy="102.5" r="0.6" fill="white"/>
    <circle cx="134.5" cy="102.5" r="0.6" fill="white"/>

    <!-- Nose -->
    <path d="M125,105 L124,113 Q123,115 126,115" fill="none" stroke="#c8a882" stroke-width="0.7" stroke-linecap="round"/>

    <!-- Mouth -->
    <path d="M118,120 Q125,126 132,120" fill="#c0554a" stroke="#9e3d33" stroke-width="0.5"/>
    <path d="M120,120 Q125,123 130,120" fill="none" stroke="#e8a090" stroke-width="0.3"/>

    <!-- Neck -->
    <rect x="119" y="134" width="12" height="12" fill="#f5deb3" stroke="none"/>

    <!-- Dress / Robe -->
    <path d="M98,146 L88,285 Q125,295 162,285 L152,146 Q125,158 98,146Z"
          fill="url(#dressGrad)" stroke="#0a1628" stroke-width="0.5"/>

    <!-- Dress ornamental patterns -->
    <line x1="125" y1="150" x2="125" y2="285" stroke="#c8a92e" stroke-width="0.6" opacity="0.5"/>
    <path d="M110,165 L125,180 L140,165" fill="none" stroke="#c8a92e" stroke-width="1.2"/>
    <path d="M105,200 L125,215 L145,200" fill="none" stroke="#c8a92e" stroke-width="1.2"/>
    <path d="M100,235 L125,250 L150,235" fill="none" stroke="#c8a92e" stroke-width="1.2"/>

    <!-- Gold brooch at neckline -->
    <circle cx="125" cy="152" r="5" fill="url(#goldGrad)" stroke="#8b7120" stroke-width="0.5"/>
    <circle cx="125" cy="152" r="2" fill="#1a5276"/>

    <!-- Scepter -->
    <line x1="152" y1="110" x2="165" y2="270" stroke="#8b7120" stroke-width="2.8" stroke-linecap="round"/>
    <circle cx="151" cy="107" r="6" fill="url(#goldGrad)" stroke="#8b7120" stroke-width="0.6"/>
    <circle cx="151" cy="107" r="2.5" fill="#c0392b"/>

    <!-- Spade pip in frame corner -->
    <text x="177" y="280" font-family="Georgia, serif" font-size="16" fill="#111" text-anchor="middle" opacity="0.6">♠</text>
  </g>

  <!-- Gloss overlay -->
  <rect width="250" height="350" rx="14" fill="url(#gloss)" opacity="0.3"/>
</svg>